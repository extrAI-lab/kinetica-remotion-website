<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.rt-hoverable').forEach(function (card) {
    card.addEventListener('mouseenter', function () {
      card.classList.remove('rt-hovering');
      void card.offsetWidth; // force reflow so browser sees a new animation start
      card.classList.add('rt-hovering');
    });
    card.addEventListener('mouseleave', function () {
      card.classList.remove('rt-hovering');
    });
  });
});
</script>
