<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#g)"/>
  <!-- Grid lines -->
  <line x1="60" y1="60" x2="60" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="60" y1="320" x2="540" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="60" y1="240" x2="540" y2="240" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="160" x2="540" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="80" x2="540" y2="80" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Bars -->
  <rect x="100" y="180" width="50" height="140" rx="6" fill="rgba(255,255,255,0.3)"/>
  <rect x="180" y="120" width="50" height="200" rx="6" fill="rgba(255,255,255,0.45)"/>
  <rect x="260" y="90" width="50" height="230" rx="6" fill="rgba(255,255,255,0.6)"/>
  <rect x="340" y="140" width="50" height="180" rx="6" fill="rgba(255,255,255,0.45)"/>
  <rect x="420" y="100" width="50" height="220" rx="6" fill="rgba(255,255,255,0.35)"/>
  <!-- Line chart on top -->
  <polyline points="100,200 180,140 260,100 340,150 420,110 500,130" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="100" cy="200" r="4" fill="white"/>
  <circle cx="180" cy="140" r="4" fill="white"/>
  <circle cx="260" cy="100" r="4" fill="white"/>
  <circle cx="340" cy="150" r="4" fill="white"/>
  <circle cx="420" cy="110" r="4" fill="white"/>
  <circle cx="500" cy="130" r="4" fill="white"/>
</svg>
