<nav style="margin-bottom:0.75rem; display:flex; gap:1.25rem;">
  <a href="{{ "privacy/" | relURL }}" style="font-size:0.8rem; color:#9090b8; text-decoration:none; transition:color 0.15s;"
     onmouseover="this.style.color='#6d41dc'" onmouseout="this.style.color='#9090b8'">Privacy Policy</a>
  <a href="{{ "terms/" | relURL }}" style="font-size:0.8rem; color:#9090b8; text-decoration:none; transition:color 0.15s;"
     onmouseover="this.style.color='#6d41dc'" onmouseout="this.style.color='#9090b8'">Terms of Service</a>
</nav>
<script src="{{ "js/remotion-components.js" | relURL }}"></script>
<script>
(function () {
  var base = {{ "" | relURL | jsonify | safeJS }}.replace(/\/$/, '');
  var path = window.location.pathname;
  var map = {};
  map[base + '/components'] = base + '/components/';
  map[base + '/contribute'] = base + '/contribute/';
  Object.keys(map).forEach(function (prefix) {
    if (path.startsWith(prefix)) {
      document.querySelectorAll('a[href="' + map[prefix] + '"]').forEach(function (a) {
        a.style.color = '#6d41dc';
        a.style.fontWeight = '700';
      });
    }
  });
})();
</script>
