{{ define "main" }}
<style>
  .rt-scene-wrap { position: relative; cursor: pointer; border-radius: 10px; }
  .rt-check {
    position: absolute; top: 10px; right: 10px; z-index: 20;
    width: 26px; height: 26px; border-radius: 50%;
    background: rgba(240,237,255,0.9); border: 2px solid #9090b8;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(4px);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .rt-check:hover { transform: scale(1.1); border-color: #6d41dc; }
  .rt-check svg { opacity: 0; transition: opacity 0.15s; }
  .rt-scene-wrap.sel .rt-check { background: #6d41dc; border-color: #6d41dc; }
  .rt-scene-wrap.sel .rt-check svg { opacity: 1; }
  .rt-scene-wrap.sel article { outline: 2px solid #6d41dc; outline-offset: -1px; }

  #rt-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: #fff; border-top: 1px solid #e4e4f0;
    padding: 0.875rem 2rem;
    display: flex; align-items: center; gap: 1rem;
    transform: translateY(100%);
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.06);
  }
  #rt-bar.show { transform: translateY(0); }

  #rt-modal {
    display: none; position: fixed; inset: 0; z-index: 60;
    background: rgba(0,0,0,0.65);
    align-items: center; justify-content: center;
  }
  #rt-modal.show { display: flex; }
  .rt-modal-box {
    background: #fff; border: 1px solid #e4e4f0;
    border-radius: 16px; padding: 1.75rem;
    width: 580px; max-width: 92vw;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  }
  .rt-cmd-block {
    background: #f8f8fc; border: 1px solid #e4e4f0; border-radius: 8px;
    padding: 0.75rem 1rem;
    display: flex; align-items: center; gap: 0.75rem;
  }
  #rt-project-input {
    background: #fff; border: 1px solid #d0d0e0; border-radius: 8px;
    color: #1a1a2e; font-size: 0.875rem; padding: 0.5rem 0.75rem;
    outline: none; width: 100%; font-family: system-ui, sans-serif;
    transition: border-color 0.15s;
  }
  #rt-project-input:focus { border-color: #6d41dc; }
  .rt-bar-btn {
    font-size: 0.875rem; font-weight: 600; padding: 0.5rem 1.25rem;
    border-radius: 999px; border: none; cursor: pointer;
    font-family: system-ui, sans-serif;
  }
</style>

<div style="padding-top:1.5rem; padding-bottom:6rem;">

  <p class="font-semibold text-neutral-600" style="font-size:1rem; margin-bottom:2rem; max-width:600px; line-height:1.5;">
    Production-ready 3D compositions — select one or more components, then get the install command.
  </p>

  <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
    {{ range .Pages }}
    <div class="rt-scene-wrap" data-scene="{{ .Params.component }}" data-title="{{ .Title }}">
      <div class="rt-check">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      {{ partial "article-link/card.html" . }}
    </div>
    {{ end }}
  </div>

</div>

<!-- Export bar -->
<div id="rt-bar">
  <span id="rt-count" style="font-size:0.875rem; color:#52526a;"></span>
  <div style="flex:1;"></div>
  <button class="rt-bar-btn" onclick="rtClear()" style="background:#f0f0f8; color:#52526a; border:1px solid #d0d0e0;">Clear</button>
  <button class="rt-bar-btn" onclick="rtShowModal()"
    style="background:#6d41dc; color:#fff;"
    onmouseover="this.style.background='#5a2ec3'" onmouseout="this.style.background='#6d41dc'">
    Export video →
  </button>
</div>

<!-- Export modal -->
<div id="rt-modal" onclick="if(event.target===this)rtCloseModal()">
  <div class="rt-modal-box">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;">
      <h2 style="font-size:1.1rem; font-weight:700; color:#1a1a2e; margin:0;">Export video</h2>
      <button onclick="rtCloseModal()" style="background:none; border:none; color:#9090b8; font-size:1.25rem; cursor:pointer; line-height:1; padding:0;">✕</button>
    </div>

    <!-- Project name -->
    <div style="margin-bottom:1.25rem;">
      <label style="display:block; font-size:0.75rem; font-weight:600; color:#52526a; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.5rem;">Project name</label>
      <input id="rt-project-input" type="text" value="my-video" placeholder="my-video" oninput="rtUpdateCmd()">
    </div>

    <!-- Command -->
    <div style="margin-bottom:1.5rem;">
      <label style="display:block; font-size:0.75rem; font-weight:600; color:#52526a; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.5rem;">CLI command</label>

      <div class="rt-cmd-block">
        <code id="rt-cmd-text" style="font-size:0.82rem; color:#1a1a2e; font-family:monospace; flex:1; word-break:break-all; white-space:pre-wrap;"></code>
        <button id="rt-copy-btn" onclick="rtCopy()"
          style="background:#eeebff; border:none; color:#6d41dc; font-size:0.75rem; padding:4px 12px; border-radius:6px; cursor:pointer; flex-shrink:0; font-family:system-ui,sans-serif; transition:color 0.15s;"
          onmouseover="this.style.color='#5b3ae8'" onmouseout="this.style.color='#6d41dc'">
          Copy
        </button>
      </div>
    </div>

    <!-- Scenes list -->
    <div id="rt-scene-list" style="display:flex; flex-wrap:wrap; gap:6px;">
    </div>

  </div>
</div>

<script>
(function () {
  const selected = new Set();

  document.querySelectorAll('.rt-scene-wrap').forEach(wrap => {
    wrap.querySelector('.rt-check').addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const id = wrap.dataset.scene;
      if (selected.has(id)) { selected.delete(id); wrap.classList.remove('sel'); }
      else { selected.add(id); wrap.classList.add('sel'); }
      updateBar();
    });
  });

  function updateBar() {
    const n = selected.size;
    document.getElementById('rt-count').textContent = n === 1 ? '1 component selected' : `${n} components selected`;
    document.getElementById('rt-bar').classList.toggle('show', n > 0);
  }

  function buildCmd() {
    const name = document.getElementById('rt-project-input').value.trim() || 'my-video';
    const ids = Array.from(selected).join(' ');
    const nameQ = JSON.stringify(name);
    return `npx create-kinetica install ${ids} --name ${nameQ} &&\n  cd ${nameQ} &&\n  pnpm install &&\n  pnpm dev`;
  }

  window.rtUpdateCmd = function () {
    document.getElementById('rt-cmd-text').textContent = buildCmd();
  };

  window.rtShowModal = function () {
    // Chips for selected scenes
    const list = document.getElementById('rt-scene-list');
    list.innerHTML = '';
    document.querySelectorAll('.rt-scene-wrap.sel').forEach(wrap => {
      const chip = document.createElement('span');
      chip.style.cssText = 'display:inline-flex;align-items:center;gap:5px;background:#f0edff;border:1px solid #c8c0e8;border-radius:6px;padding:3px 10px;font-size:0.78rem;color:#52526a;font-family:system-ui,sans-serif;';
      chip.innerHTML = `<span style="width:5px;height:5px;border-radius:50%;background:#6d41dc;flex-shrink:0;"></span>${wrap.dataset.title}`;
      list.appendChild(chip);
    });
    rtUpdateCmd();
    document.getElementById('rt-modal').classList.add('show');
  };

  window.rtCloseModal = function () {
    document.getElementById('rt-modal').classList.remove('show');
    document.getElementById('rt-copy-btn').textContent = 'Copy';
  };

  window.rtCopy = function () {
    navigator.clipboard.writeText(buildCmd());
    const btn = document.getElementById('rt-copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  };

  window.rtClear = function () {
    selected.clear();
    document.querySelectorAll('.rt-scene-wrap.sel').forEach(w => w.classList.remove('sel'));
    updateBar();
  };
})();
</script>

{{ end }}
