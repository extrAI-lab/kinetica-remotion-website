# remotion-components root when running `hugo server` only (scenes list export + scene detail “Install” box).
# Resolved to an absolute path: param > REMOTION_COMPONENTS_ROOT > PWD/../remotion-components
# createKineticaLocalRoot = "relative/or/absolute/path"

colorScheme = "slate"
defaultAppearance = "dark"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = false

mainSections = ["components"]
thumbnailAspectRatio = "1.77"

disableImageOptimization = false
disableTextInHeader = false

[header]
  layout = "fixed"

[footer]
  showMenu = false
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = false
  showScrollToTop = true

[homepage]
  layout = "custom"
  showRecent = false
  cardView = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = false

[article]
  showDate = false
  showAuthor = false
  showHero = true
  heroStyle = "big"
  showBreadcrumbs = false
  showDraftLabel = false
  showEdit = false
  showReadingTime = false

[list]
  showBreadcrumbs = false
  showSummary = true
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false
