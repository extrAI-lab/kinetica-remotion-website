<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#g)"/>
  <!-- Countdown digits panels -->
  <!-- Days -->
  <rect x="40" y="100" width="110" height="120" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="40" y="155" width="110" height="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="65" y="120" width="60" height="75" rx="6" fill="rgba(255,255,255,0.1)"/>
  <!-- Hours -->
  <rect x="165" y="100" width="110" height="120" rx="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="165" y="155" width="110" height="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="190" y="120" width="60" height="75" rx="6" fill="rgba(255,255,255,0.1)"/>
  <!-- Minutes -->
  <rect x="290" y="100" width="110" height="120" rx="14" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <rect x="290" y="155" width="110" height="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="315" y="120" width="60" height="75" rx="6" fill="rgba(255,255,255,0.12)"/>
  <!-- Seconds -->
  <rect x="415" y="100" width="110" height="120" rx="14" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <rect x="415" y="155" width="110" height="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="440" y="120" width="60" height="75" rx="6" fill="rgba(255,255,255,0.15)"/>
  <!-- Labels -->
  <rect x="55" y="235" width="80" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
  <rect x="180" y="235" width="80" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
  <rect x="305" y="235" width="80" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
  <rect x="430" y="235" width="80" height="10" rx="5" fill="rgba(255,255,255,0.25)"/>
  <!-- Event title -->
  <rect x="100" y="290" width="400" height="30" rx="8" fill="rgba(255,255,255,0.12)"/>
  <!-- Dots separators -->
  <circle cx="155" cy="150" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="155" cy="165" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="280" cy="150" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="280" cy="165" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="405" cy="150" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="405" cy="165" r="5" fill="rgba(255,255,255,0.5)"/>
</svg>
