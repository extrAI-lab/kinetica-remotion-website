<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#g)"/>
  <!-- Cinematic lines -->
  <rect x="0" y="0" width="600" height="40" fill="rgba(0,0,0,0.35)"/>
  <rect x="0" y="360" width="600" height="40" fill="rgba(0,0,0,0.35)"/>
  <!-- Product box 3D -->
  <polygon points="180,120 360,120 360,280 180,280" fill="rgba(255,255,255,0.18)"/>
  <polygon points="360,120 420,70 420,230 360,280" fill="rgba(255,255,255,0.1)"/>
  <polygon points="180,120 240,70 420,70 360,120" fill="rgba(255,255,255,0.25)"/>
  <!-- Glow -->
  <ellipse cx="300" cy="310" rx="120" ry="18" fill="rgba(0,0,0,0.3)"/>
  <!-- Lines decoration -->
  <line x1="60" y1="200" x2="140" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="60" y1="215" x2="120" y2="215" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="460" y1="200" x2="540" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <line x1="480" y1="215" x2="540" y2="215" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Stars -->
  <circle cx="80" cy="100" r="3" fill="rgba(255,255,255,0.6)"/>
  <circle cx="510" cy="80" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="540" cy="300" r="4" fill="rgba(255,255,255,0.4)"/>
  <circle cx="50" cy="320" r="3" fill="rgba(255,255,255,0.5)"/>
</svg>
