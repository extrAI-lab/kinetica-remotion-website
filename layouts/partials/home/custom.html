<!-- Carousel -->
<style>
  @keyframes rt-marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  #rt-carousel-track {
    animation: rt-marquee 40s linear infinite;
  }
</style>

<div style="overflow:hidden; margin-top:2rem; margin-bottom:2.5rem; -webkit-mask-image:linear-gradient(to right,transparent,#000 10%,#000 90%,transparent); mask-image:linear-gradient(to right,transparent,#000 10%,#000 90%,transparent);">
  <div id="rt-carousel-track" style="display:flex; gap:1.25rem; width:max-content;">
    {{ $items := slice "terminal-3d" "transform3d-showcase" "terminal-3d" "transform3d-showcase" "terminal-3d" "transform3d-showcase" }}
    {{ range $items }}
    <div style="width:380px; height:214px; position:relative; border-radius:12px; overflow:hidden; background:#0f0f0f; border:1px solid #2a2a2a; flex-shrink:0;">
      <div class="rt-carousel-item" data-component="{{ . }}" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none;"></div>
    </div>
    {{ end }}
    {{ range $items }}
    <div style="width:380px; height:214px; position:relative; border-radius:12px; overflow:hidden; background:#0f0f0f; border:1px solid #2a2a2a; flex-shrink:0;">
      <div class="rt-carousel-item" data-component="{{ . }}" style="position:absolute; inset:0; width:100%; height:100%; pointer-events:none;"></div>
    </div>
    {{ end }}
  </div>
</div>

<!-- CTA -->
<div style="text-align:center; padding-bottom:4rem;">
  <a href="/scenes/"
     style="display:inline-flex; align-items:center; gap:0.5rem; background:#6366f1; color:#fff; font-weight:600; font-size:1rem; padding:0.75rem 2rem; border-radius:999px; text-decoration:none; transition:background 0.15s;"
     onmouseover="this.style.background='#4f46e5'" onmouseout="this.style.background='#6366f1'">
    Browse scenes →
  </a>
</div>
