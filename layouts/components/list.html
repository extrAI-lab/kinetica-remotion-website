{{ define "main" }}
<style>
  .rt-scene-wrap {
    position: relative;
    cursor: pointer;
    border-radius: 10px;
  }

  .rt-check {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 20;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(240, 237, 255, 0.9);
    border: 2px solid #9090b8;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }

  .rt-check:hover {
    transform: scale(1.1);
    border-color: #6d41dc;
  }

  .rt-check svg {
    opacity: 0;
    transition: opacity 0.15s;
  }

  .rt-scene-wrap.sel .rt-check {
    background: #6d41dc;
    border-color: #6d41dc;
  }

  .rt-scene-wrap.sel .rt-check svg {
    opacity: 1;
  }

  .rt-scene-wrap.sel article {
    outline: 2px solid #6d41dc;
    outline-offset: -1px;
  }

  #rt-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: #fff;
    border-top: 1px solid #e4e4f0;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.875rem;
    transform: translateY(100%);
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.06);
  }

  #rt-bar.show {
    transform: translateY(0);
  }

  #rt-cmd-inline {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 0.625rem;
    background: #f8f8fc;
    border: 1px solid #e4e4f0;
    border-radius: 8px;
    padding: 0.5rem 0.625rem 0.5rem 0.875rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  #rt-cmd-inline:hover {
    border-color: #b8a8e8;
    background: #f0edff;
  }

  #rt-cmd-inline>* {
    pointer-events: none;
  }

  #rt-cmd-text {
    flex: 1;
    min-width: 0;
    font-family: monospace;
    font-size: 0.82rem;
    color: #1a1a2e;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #rt-copy-hint {
    flex-shrink: 0;
    font-size: 0.75rem;
    font-weight: 600;
    color: #9090b8;
    font-family: system-ui, sans-serif;
    transition: color 0.15s;
  }

  #rt-cmd-inline:hover #rt-copy-hint {
    color: #6d41dc;
  }

  #rt-cmd-inline.copied {
    border-color: #86efac;
    background: #f0fdf4;
  }

  #rt-cmd-inline.copied #rt-cmd-text {
    color: #15803d;
  }

  #rt-cmd-inline.copied #rt-copy-hint {
    color: #22c55e;
  }

  #rt-dismiss-btn {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid #d0d0e0;
    background: #f0f0f8;
    color: #9090b8;
    font-size: 0.85rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  #rt-dismiss-btn:hover {
    border-color: #9090b8;
    color: #1a1a2e;
    background: #e8e4f8;
  }
</style>

<div style="padding-top:1.5rem; padding-bottom:6rem;">

  <h1 style="font-size: clamp(1.6rem,3vw,2.2rem); font-weight: 800; color: #1a1a2e; margin: 0 0 0.75rem;">
    Ready to use animations
  </h1>
  <p class="font-semibold text-neutral-600" style="font-size:1rem; margin-bottom:2rem; line-height:1.5;">
    Select one or more components, then get the install command.
  </p>

  <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
    {{ range .Pages }}
    <div class="rt-scene-wrap" data-scene="{{ .Params.component }}" data-title="{{ .Title }}">
      <div class="rt-check">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      {{ partial "article-link/card.html" . }}
    </div>
    {{ end }}
  </div>

</div>

<!-- Inline command bar -->
<div id="rt-bar">
  <button id="rt-dismiss-btn" onclick="rtClear()" title="Clear selection">✕</button>
  <span id="rt-count"
    style="flex-shrink:0; font-size:0.8rem; font-weight:600; color:#52526a; white-space:nowrap;"></span>
  <div id="rt-cmd-inline" title="Click to copy">
    <span
      style="flex-shrink:0; width:22px; height:22px; background:#cc3534; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:900; color:white; letter-spacing:-0.5px;">n</span>
    <code id="rt-cmd-text"></code>
    <span id="rt-copy-hint">copy</span>
  </div>
</div>

<script>
  (function () {
    const selected = new Set();

    document.querySelectorAll('.rt-scene-wrap').forEach(wrap => {
      wrap.querySelector('.rt-check').addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        const id = wrap.dataset.scene;
        if (selected.has(id)) { selected.delete(id); wrap.classList.remove('sel'); }
        else { selected.add(id); wrap.classList.add('sel'); }
        updateBar();
      });
    });

    function buildCmd() {
      const ids = Array.from(selected).join(' ');
      return `npx create-kinetica install ${ids}`;
    }

    function updateBar() {
      const n = selected.size;
      document.getElementById('rt-count').textContent = n === 1 ? '1 selected' : `${n} selected`;
      document.getElementById('rt-cmd-text').textContent = buildCmd();
      document.getElementById('rt-bar').classList.toggle('show', n > 0);
    }

    function doCopy() {
      navigator.clipboard.writeText(buildCmd());
      const hint = document.getElementById('rt-copy-hint');
      const block = document.getElementById('rt-cmd-inline');
      hint.textContent = '✓ copied!';
      block.classList.add('copied');
      setTimeout(() => {
        hint.textContent = 'copy';
        block.classList.remove('copied');
      }, 1500);
    }

    document.getElementById('rt-cmd-inline').addEventListener('click', doCopy);

    window.rtClear = function () {
      selected.clear();
      document.querySelectorAll('.rt-scene-wrap.sel').forEach(w => w.classList.remove('sel'));
      updateBar();
    };
  })();
</script>

{{ end }}
